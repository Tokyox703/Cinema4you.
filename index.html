// ========== بيانات المستخدم والترجمة ==========
let userData = { favorites: [], watchlist: [], watched: [] };
let currentLang = localStorage.getItem('cinema4you_lang') || 'ar';
let currentCategory = "all";
let currentSearch = "";
let currentPage = "home";

const langData = {
    ar: {
        logoText: "سينما فور يو", homeTab: "الرئيسية", favTab: "مفضلاتي", watchlistTab: "للمشاهدة لاحقاً", watchedTab: "تم مشاهدتها",
        visitorText: "زائر", langText: "English", searchPlaceholder: "🔍 ابحث عن فيلم...", sectionTitle: "أحدث الإصدارات",
        viewAllText: "عرض الكل", adText: "✨ عروض حصرية - اضغط هنا", footerText: "سينما فور يو | Cinema4You - منصة مجانية لمشاهدة وتحميل الأفلام بجودة عالية",
        copyright: "© 2025 سينما فور يو - جميع الحقوق محفوظة", hashtags: "#سينما_فور_يو #Cinema4You #افلام_انميشن #ديزني #بيكسار #دريم_ووركس #افلام_2025",
        categories: { all: "🎬 الكل", animation: "🎨 أنميشن", scifi: "🚀 خيال علمي" },
        toastAddedFav: "✅ أُضيف إلى المفضلة", toastRemovedFav: "❌ أُزيل من المفضلة",
        toastAddedWatch: "⏰ أُضيف للمشاهدة لاحقاً", toastRemovedWatch: "❌ أُزيل",
        toastWatched: "🎬 تم تسجيل الفيلم كمشاهد", noResults: "😢 لا توجد أفلام مطابقة"
    },
    en: {
        logoText: "Cinema4You", homeTab: "Home", favTab: "Favorites", watchlistTab: "Watch Later", watchedTab: "Watched",
        visitorText: "visitors", langText: "العربية", searchPlaceholder: "🔍 Search movies...", sectionTitle: "Latest Releases",
        viewAllText: "View All", adText: "✨ Exclusive Offers - Click Here", footerText: "Cinema4You | Free platform to watch and download movies in high quality",
        copyright: "© 2025 Cinema4You - All Rights Reserved", hashtags: "#Cinema4You #AnimationMovies #Disney #Pixar #DreamWorks",
        categories: { all: "🎬 All", animation: "🎨 Animation", scifi: "🚀 Sci-Fi" },
        toastAddedFav: "✅ Added to favorites", toastRemovedFav: "❌ Removed",
        toastAddedWatch: "⏰ Added to watch later", toastRemovedWatch: "❌ Removed",
        toastWatched: "🎬 Marked as watched", noResults: "😢 No movies found"
    }
};

function loadUserData() { const saved = localStorage.getItem('cinema4you_userData'); if (saved) userData = JSON.parse(saved); }
function saveUserData() { localStorage.setItem('cinema4you_userData', JSON.stringify(userData)); }
function showToast(message) { const toast = document.getElementById("toast"); toast.textContent = message; toast.style.display = "block"; setTimeout(() => toast.style.display = "none", 2500); }

window.toggleFavorite = function(id, event) {
    if(event) event.stopPropagation();
    const data = langData[currentLang];
    if (userData.favorites.includes(id)) {
        userData.favorites = userData.favorites.filter(i => i !== id);
        showToast(data.toastRemovedFav);
    } else {
        userData.favorites.push(id);
        showToast(data.toastAddedFav);
    }
    saveUserData();
    renderMovies();
};

window.toggleWatchlist = function(id, event) {
    if(event) event.stopPropagation();
    const data = langData[currentLang];
    if (userData.watchlist.includes(id)) {
        userData.watchlist = userData.watchlist.filter(i => i !== id);
        showToast(data.toastRemovedWatch);
    } else {
        userData.watchlist.push(id);
        showToast(data.toastAddedWatch);
    }
    saveUserData();
    renderMovies();
};

window.markAsWatched = function(id, event) {
    if(event) event.stopPropagation();
    if (!userData.watched.includes(id)) {
        userData.watched.push(id);
        saveUserData();
        showToast(langData[currentLang].toastWatched);
    }
};

function renderMovies() {
    let filtered = [...movies];
    if (currentPage === "favorites") filtered = filtered.filter(m => userData.favorites.includes(m.id));
    else if (currentPage === "watchlist") filtered = filtered.filter(m => userData.watchlist.includes(m.id));
    else if (currentPage === "watched") filtered = filtered.filter(m => userData.watched.includes(m.id));
    else {
        if (currentCategory !== "all") filtered = filtered.filter(m => m.category === currentCategory);
        if (currentSearch.trim()) {
            const searchLower = currentSearch.toLowerCase();
            filtered = filtered.filter(m => m.titleAr.toLowerCase().includes(searchLower) || m.titleEn.toLowerCase().includes(searchLower));
        }
    }
    
    const grid = document.getElementById("moviesGrid");
    if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-results">${langData[currentLang].noResults}</div>`;
        return;
    }
    
    grid.innerHTML = filtered.map(movie => {
        const title = currentLang === 'ar' ? movie.titleAr : movie.titleEn;
        const categoryName = currentLang === 'ar' ? movie.categoryAr : (movie.category === 'animation' ? 'Animation' : 'Sci-Fi');
        return `
            <a href="${movie.file}" class="movie-card" data-id="${movie.id}">
                <div class="movie-poster">
                    <img src="${movie.poster}" alt="${title}" loading="lazy" onerror="this.src='https://picsum.photos/300/450?grayscale'">
                    <div class="movie-rating">⭐ ${movie.rating}</div>
                    <div class="movie-year">📅 ${movie.year}</div>
                    ${movie.rating >= 9.1 ? '<div class="movie-badge">🔥 Top Rated</div>' : ''}
                </div>
                <div class="movie-actions">
                    <button class="movie-action-btn" onclick="event.stopPropagation(); window.markAsWatched(${movie.id}, event)"><i class="fas fa-check-circle"></i></button>
                    <button class="movie-action-btn" onclick="event.stopPropagation(); window.toggleFavorite(${movie.id}, event)"><i class="fa-heart ${userData.favorites.includes(movie.id) ? 'fas' : 'far'}"></i></button>
                    <button class="movie-action-btn" onclick="event.stopPropagation(); window.toggleWatchlist(${movie.id}, event)"><i class="fa-clock ${userData.watchlist.includes(movie.id) ? 'fas' : 'far'}"></i></button>
                </div>
                <div class="movie-info">
                    <div class="movie-title">${title}</div>
                    <div class="movie-category">${categoryName}</div>
                </div>
            </a>
        `;
    }).join("");
}

function updateLanguage() {
    const data = langData[currentLang];
    document.getElementById('logoText').textContent = data.logoText;
    document.getElementById('homeTab').querySelector('span').textContent = data.homeTab;
    document.getElementById('favTab').querySelector('span').textContent = data.favTab;
    document.getElementById('watchlistTab').querySelector('span').textContent = data.watchlistTab;
    document.getElementById('watchedTab').querySelector('span').textContent = data.watchedTab;
    document.getElementById('visitorText').textContent = data.visitorText;
    document.getElementById('langText').textContent = data.langText;
    document.getElementById('searchInput').placeholder = data.searchPlaceholder;
    document.getElementById('sectionTitle').innerHTML = `<i class="fas fa-fire"></i> ${data.sectionTitle}`;
    document.getElementById('viewAllText').textContent = data.viewAllText;
    document.getElementById('adText').textContent = data.adText;
    document.getElementById('footerText').innerHTML = `<i class="fas fa-film"></i> ${data.footerText}`;
    document.getElementById('copyright').textContent = data.copyright;
    document.getElementById('hashtagSection').innerHTML = `<i class="fab fa-twitter"></i> ${data.hashtags} <i class="fas fa-tags"></i>`;
    
    const categoriesContainer = document.getElementById('categories');
    categoriesContainer.innerHTML = `
        <button class="cat-btn active" data-cat="all">${data.categories.all}</button>
        <button class="cat-btn" data-cat="animation">${data.categories.animation}</button>
        <button class="cat-btn" data-cat="scifi">${data.categories.scifi}</button>
    `;
    
    document.querySelectorAll(".cat-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            if (currentPage !== "home") {
                currentPage = "home";
                document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
                document.querySelector('.nav-tab[data-page="home"]').classList.add("active");
            }
            document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.cat;
            renderMovies();
        });
    });
    
    renderMovies();
}

function init() {
    loadUserData();
    
    // عداد الزوار
    let visitors = localStorage.getItem('cinema4you_visitors');
    if (!visitors) visitors = 1247;
    visitors = parseInt(visitors);
    const today = new Date().toDateString();
    const lastVisit = localStorage.getItem('cinema4you_lastVisit');
    if (lastVisit !== today) {
        visitors++;
        localStorage.setItem('cinema4you_visitors', visitors);
        localStorage.setItem('cinema4you_lastVisit', today);
    }
    document.getElementById('visitorCount').textContent = visitors.toLocaleString();
    
    // أزرار التنقل
    document.querySelectorAll(".nav-tab").forEach(tab => {
        tab.addEventListener("click", () => {
            document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            currentPage = tab.dataset.page;
            if (currentPage === "home") {
                currentCategory = "all";
                document.querySelectorAll(".cat-btn").forEach(btn => {
                    btn.classList.remove("active");
                    if (btn.dataset.cat === "all") btn.classList.add("active");
                });
            }
            currentSearch = "";
            document.getElementById("searchInput").value = "";
            renderMovies();
        });
    });
    
    // البحث
    document.getElementById("searchBtn").addEventListener("click", () => {
        if (currentPage !== "home") {
            currentPage = "home";
            document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
            document.querySelector('.nav-tab[data-page="home"]').classList.add("active");
            currentCategory = "all";
            document.querySelectorAll(".cat-btn").forEach(btn => {
                btn.classList.remove("active");
                if (btn.dataset.cat === "all") btn.classList.add("active");
            });
        }
        currentSearch = document.getElementById("searchInput").value;
        renderMovies();
    });
    
    document.getElementById("searchInput").addEventListener("keypress", e => { if (e.key === "Enter") document.getElementById("searchBtn").click(); });
    document.getElementById("themeToggle").addEventListener("click", () => { document.body.classList.toggle('dark-mode'); document.body.classList.toggle('light-mode'); });
    document.getElementById("fullscreenBtn").addEventListener("click", () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });
    document.getElementById("scrollTop").addEventListener("click", () => { window.scrollTo({ top: 0, behavior: "smooth" }); });
    window.addEventListener("scroll", () => { document.getElementById("scrollTop").classList.toggle("show", window.scrollY > 200); });
    document.getElementById("logoRefresh").addEventListener("click", () => { location.reload(); });
    document.getElementById("viewAllBtn").addEventListener("click", () => {
        currentCategory = "all";
        document.querySelectorAll(".cat-btn").forEach(btn => { btn.classList.remove("active"); if (btn.dataset.cat === "all") btn.classList.add("active"); });
        currentSearch = "";
        document.getElementById("searchInput").value = "";
        renderMovies();
        window.scrollTo({ top: 600, behavior: "smooth" });
    });
    document.getElementById("langToggle").addEventListener("click", () => {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        localStorage.setItem('cinema4you_lang', currentLang);
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateLanguage();
    });
    
    updateLanguage();
}

init();
</script>
