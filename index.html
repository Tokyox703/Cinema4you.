    <script>
        (function() {
            // Movies Database - الروابط تؤدي إلى صفحات HTML المنفصلة
            const movies = [
                { id: 1, title: "القط ذو الحذاء: الأمنية الأخيرة", titleEn: "Puss in Boots: The Last Wish", file: "puss-in-boots.html", year: 2022, rating: 9.2, category: "animation", categoryAr: "أنميشن", poster: "https://upload.wikimedia.org/wikipedia/ar/0/06/Puss_in_Boots_The_Last_Wish.jpeg", plot: "فيلم مغامرة كوميدي مذهل. القط الأسطوري 'بوس' يكتشف أنه استنفذ 8 من أرواحه التسعة، ويبدأ رحلة ملحمية خطيرة عبر الغابة المظلمة للعثور على نجمة الأمنيات الأخيرة. مليء بالإثارة واللحظات المؤثرة والفكاهة الذكية.", duration: 102 },
                { id: 2, title: "سحر الأقدار - Spellbound", titleEn: "Spellbound 2024", file: "spellbound.html", year: 2024, rating: 8.5, category: "animation", categoryAr: "أنميشن", poster: "https://m.media-amazon.com/images/M/MV5BYTU4NWFlMjEtZGFhMi00NzkxLWJkODQtOWExNDQ2NGVjM2RjXkEyXkFqcGc@._V1_.jpg", plot: "فيلم موسيقي ساحر من إنتاج سوني. الأميرة 'إيليان' تعيش في مملكة لومبريا حيث يتحول والداها إلى وحوش. تنطلق في رحلة استثنائية لكسر التعويذة وإعادة السلام إلى مملكتها.", duration: 109 },
                { id: 3, title: "شمشون: نهاية العالم", titleEn: "Samson: End of the World", file: "samson.html", year: 2024, rating: 9.3, category: "scifi", categoryAr: "أنميشن ", poster: "https://upload.wikimedia.org/wikipedia/en/1/15/Plankton_The_Movie_poster.jpg", plot: "خيال علمي مثير. شاب يدعى شمشون يخترع رفيقة آلية فائقة الذكاء، لكنها تتحول إلى تهديد وجودي للبشرية بعد أن تطور وعيًا خاصًا وتقرر أن العالم بحاجة إلى إعادة ضبط.", duration: 118 },
                { id: 4, title: "سبونج بوب: الهولندي الطائر", titleEn: "SpongeBob: The Flying Dutchman", file: "spongebob.html", year: 2025, rating: 9.4, category: "animation", categoryAr: "أنميشن", poster: "https://rricoid-assets.obs.ap-southeast-4.myhuaweicloud.com/berita/Denpasar/o/1766129140956-the_spongebob_movie__search_for_squarepants_by_dbozartist_dh84eez-fullview/e2n06i60ikxs14u.jpeg", plot: "مغامرة جديدة ومضحكة تحت الماء. يقرر سبونج بوب وبسيط وشاندي مواجهة القرصان الهولندي الطائر الأسطوري لإنقاذ صديقهم المختطف. رحلة مليئة بالمرح والفوضى.", duration: 95 },
                { id: 5, title: "الماعز: رحلة الأحلام", titleEn: "Mooz 2026", file: "mooz.html", year: 2026, rating: 9.2, category: "animation", categoryAr: "أنميشن", poster: "https://upload.wikimedia.org/wikipedia/ar/b/be/%D9%85%D9%84%D8%B5%D9%82_%D9%81%D9%84%D9%85_%D8%A7%D9%84%D9%85%D8%A7%D8%B9%D8%B2.jpg", plot: "فيلم أنميشن ثلاثي الأبعاد مبهر. معزة صغيرة تحلم بأن تصبح بطلة خارقة، وتخوض مغامرة غير متوقعة عبر الزمن لإنقاذ قريتها من الجفاف. قصة ملهمة عن الإصرار.", duration: 110 },
                { id: 6, title: "زوتوبيا 2: عودة الأبطال", titleEn: "Zootopia 2", file: "zootopia2.html", year: 2026, rating: 9.5, category: "animation", categoryAr: "أنميشن", poster: "https://ksa.grandcinemasme.com/Media/resized-0a55f5e1-f2e0-432f-a78a-426b668020ce.jpg", plot: "المتابعة المنتظرة للكلاسيكي المحبوب. تعود المحققة جودي هوبز وشريكها نيك وايلد في قضية جديدة غامضة تهدد السلام بين حيوانات المدينة. مغامرة مليئة بالتشويق والفكاهة.", duration: 118 },
                { id: 7, title: "الهجرة الكبرى: الرحلة", titleEn: "Migration", file: "migration.html", year: 2023, rating: 8.4, category: "animation", categoryAr: "أنميشن", poster: "https://images.justwatch.com/poster/338698547/s718/migration.jpg", plot: "كوميديا مغامرات من إنتاج إليميشن. عائلة من البط البري تخوض أول رحلة هجرة لها من بركة صغيرة إلى جامايكا المشمسة. رحلة مضحكة ومليئة بالتحديات.", duration: 92 },
                { id: 8, title: "السنافر: جزيرة الكنز", titleEn: "Smurfs 2025", file: "smurfs.html", year: 2025, rating: 8.7, category: "animation", categoryAr: "أنميشن", poster: "https://upload.wikimedia.org/wikipedia/ar/c/c5/%D9%85%D9%84%D8%B5%D9%82_%D9%81%D9%8A%D9%84%D9%85_%D8%A7%D9%84%D8%B3%D9%86%D8%A7%D9%81%D8%B1.png", plot: "مغامرة جديدة وملونة مع السنافر الصغار. يكتشفون خريطة قديمة تقودهم إلى جزيرة مليئة بالأسرار والمفاجآت. سعياً وراء الكنز الأسطوري.", duration: 95 }
            ];

            // User Data for favorites, watchlist, watched
            let userData = { favorites: [], watchlist: [], watched: [] };
            
            function loadUserData() { 
                const saved = localStorage.getItem('cinema4you_userData'); 
                if (saved) userData = JSON.parse(saved); 
            }
            
            function saveUserData() { 
                localStorage.setItem('cinema4you_userData', JSON.stringify(userData)); 
            }
            
            window.isFavorite = (id) => userData.favorites.includes(id);
            window.isInWatchlist = (id) => userData.watchlist.includes(id);
            window.isWatched = (id) => userData.watched.includes(id);
            
            window.toggleFavorite = function(id, event) {
                if(event) event.stopPropagation();
                if (window.isFavorite(id)) {
                    userData.favorites = userData.favorites.filter(i => i !== id);
                } else {
                    userData.favorites.push(id);
                }
                saveUserData();
                renderMovies();
                showToast(window.isFavorite(id) ? "✅ أُضيف إلى المفضلة" : "❌ أُزيل من المفضلة");
            };
            
            window.toggleWatchlist = function(id, event) {
                if(event) event.stopPropagation();
                if (window.isInWatchlist(id)) {
                    userData.watchlist = userData.watchlist.filter(i => i !== id);
                } else {
                    userData.watchlist.push(id);
                }
                saveUserData();
                renderMovies();
                showToast(window.isInWatchlist(id) ? "⏰ أُضيف للمشاهدة لاحقاً" : "❌ أُزيل");
            };
            
            window.markAsWatched = function(id, event) {
                if(event) event.stopPropagation();
                if (!window.isWatched(id)) {
                    userData.watched.push(id);
                    saveUserData();
                    showToast("🎬 تم تسجيل الفيلم كمشاهد");
                }
            };
            
            function showToast(message) {
                const toast = document.getElementById("toast");
                toast.textContent = message;
                toast.style.display = "block";
                setTimeout(() => toast.style.display = "none", 2500);
            }
            
            // Visitor Counter
            let visitors = localStorage.getItem('cinema4you_visitors');
            if (!visitors) visitors = 1247;
            visitors = parseInt(visitors);
            const today = new Date().toDateString();
            const lastVisit = localStorage.getItem('cinema4you_lastVisit');
            if (lastVisit !== today) {
                visitors++;
                localStorage.setItem('cinema4you_visitors', visitors);
                localStorage.setItem('cinema4you_lastVisit', today);
            }
            document.getElementById('visitorCount').textContent = visitors.toLocaleString('ar-EG');
            
            // State Management
            let currentMovies = [...movies];
            let currentCategory = "all";
            let currentSearch = "";
            let currentPage = "home";
            const moviesGrid = document.getElementById("moviesGrid");
            
            function filterMovies() {
                let filtered = [...movies];
                
                if (currentPage === "favorites") {
                    filtered = filtered.filter(m => userData.favorites.includes(m.id));
                } else if (currentPage === "watchlist") {
                    filtered = filtered.filter(m => userData.watchlist.includes(m.id));
                } else if (currentPage === "watched") {
                    filtered = filtered.filter(m => userData.watched.includes(m.id));
                } else {
                    if (currentCategory !== "all") {
                        filtered = filtered.filter(m => m.category === currentCategory);
                    }
                    if (currentSearch.trim()) {
                        filtered = filtered.filter(m => m.title.includes(currentSearch) || m.titleEn.toLowerCase().includes(currentSearch.toLowerCase()));
                    }
                }
                currentMovies = filtered;
                renderMovies();
            }
            
            function renderMovies() {
                if (currentMovies.length === 0) {
                    moviesGrid.innerHTML = `<div class="no-results">😢 لا توجد أفلام مطابقة</div>`;
                    return;
                }
                
                moviesGrid.innerHTML = currentMovies.map(movie => `
                    <a href="${movie.file}" class="movie-card" data-id="${movie.id}">
                        <div class="movie-poster">
                            <img src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://picsum.photos/300/450?grayscale'">
                            <div class="movie-rating">⭐ ${movie.rating}</div>
                            <div class="movie-year">📅 ${movie.year}</div>
                            ${movie.rating >= 9 ? '<div class="movie-badge">🔥 الأكثر مشاهدة</div>' : ''}
                        </div>
                        <div class="movie-actions">
                            <button class="movie-action-btn" onclick="event.stopPropagation(); window.markAsWatched(${movie.id}, event)"><i class="fas fa-check-circle"></i></button>
                            <button class="movie-action-btn" onclick="event.stopPropagation(); window.toggleFavorite(${movie.id}, event)"><i class="fa-heart ${window.isFavorite(movie.id) ? 'fas' : 'far'}"></i></button>
                            <button class="movie-action-btn" onclick="event.stopPropagation(); window.toggleWatchlist(${movie.id}, event)"><i class="fa-clock ${window.isInWatchlist(movie.id) ? 'fas' : 'far'}"></i></button>
                        </div>
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-category">${movie.categoryAr}</div>
                        </div>
                    </a>
                `).join("");
            }
            
            // Event Listeners
            document.querySelectorAll(".nav-tab").forEach(tab => {
                tab.addEventListener("click", () => {
                    document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
                    tab.classList.add("active");
                    currentPage = tab.dataset.page;
                    if (currentPage === "home") {
                        currentCategory = "all";
                        document.querySelectorAll(".cat-btn").forEach(btn => {
                            btn.classList.remove("active");
                            if (btn.dataset.cat === "all") btn.classList.add("active");
                        });
                    }
                    currentSearch = "";
                    document.getElementById("searchInput").value = "";
                    filterMovies();
                });
            });
            
            document.querySelectorAll(".cat-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    if (currentPage !== "home") {
                        currentPage = "home";
                        document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
                        document.querySelector('.nav-tab[data-page="home"]').classList.add("active");
                    }
                    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = btn.dataset.cat;
                    filterMovies();
                });
            });
            
            document.getElementById("searchBtn")?.addEventListener("click", () => {
                if (currentPage !== "home") {
                    currentPage = "home";
                    document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
                    document.querySelector('.nav-tab[data-page="home"]').classList.add("active");
                    currentCategory = "all";
                    document.querySelectorAll(".cat-btn").forEach(btn => {
                        btn.classList.remove("active");
                        if (btn.dataset.cat === "all") btn.classList.add("active");
                    });
                }
                currentSearch = document.getElementById("searchInput").value;
                filterMovies();
            });
            
            document.getElementById("searchInput")?.addEventListener("keypress", e => {
                if (e.key === "Enter") document.getElementById("searchBtn").click();
            });
            
            document.getElementById("themeToggle")?.addEventListener("click", () => {
                document.body.classList.toggle('dark-mode');
                document.body.classList.toggle('light-mode');
            });
            
            document.getElementById("fullscreenBtn")?.addEventListener("click", () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            });
            
            document.getElementById("scrollTop")?.addEventListener("click", () => {
                window.scrollTo({ top: 0, behavior: "smooth" });
            });
            
            window.addEventListener("scroll", () => {
                document.getElementById("scrollTop").classList.toggle("show", window.scrollY > 200);
            });
            
            document.getElementById("logoRefresh")?.addEventListener("click", () => {
                location.reload();
            });
            
            document.getElementById("viewAllBtn")?.addEventListener("click", () => {
                currentCategory = "all";
                document.querySelectorAll(".cat-btn").forEach(btn => {
                    btn.classList.remove("active");
                    if (btn.dataset.cat === "all") btn.classList.add("active");
                });
                currentSearch = "";
                document.getElementById("searchInput").value = "";
                filterMovies();
                window.scrollTo({ top: 600, behavior: "smooth" });
            });
            
            // Particles Animation
            function initParticles() {
                const container = document.getElementById("particleContainer");
                for (let i = 0; i < 50; i++) {
                    const p = document.createElement("div");
                    p.classList.add("particle");
                    p.style.width = `${Math.random() * 4 + 2}px`;
                    p.style.height = p.style.width;
                    p.style.left = `${Math.random() * 100}%`;
                    p.style.animationDuration = `${Math.random() * 12 + 8}s`;
                    p.style.animationDelay = `${Math.random() * 6}s`;
                    p.style.background = `radial-gradient(circle, rgba(229,9,20,0.6), transparent)`;
                    container.appendChild(p);
                }
            }
            
            // Initialize
            loadUserData();
            initParticles();
            renderMovies();
            
            console.log("%c🎬 Cinema4You | سينما فور يو - أكبر منصة لمشاهدة وتحميل الأفلام مجاناً", "color: #e50914; font-size: 16px; font-weight: bold;");
        })();
    </script>
</body>
</html>
